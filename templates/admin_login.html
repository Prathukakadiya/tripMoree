<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — TripMoree</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Outfit',sans-serif;background:#0d1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:24px;padding:3rem 2.5rem;width:380px;text-align:center;}
.logo{font-family:Georgia,serif;font-size:2rem;color:#0d0f0e;margin-bottom:.3rem;}.logo span{color:#c9a84c;}
.sub{font-size:13px;color:#888;margin-bottom:2rem;}
.fg{margin-bottom:1.2rem;text-align:left;}
.fg label{display:block;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.fg input{width:100%;padding:13px 16px;border:1.5px solid #e8e4de;border-radius:12px;font-size:14px;font-family:inherit;outline:none;}
.fg input:focus{border-color:#c9a84c;}
.sbtn{width:100%;padding:14px;background:linear-gradient(135deg,#c9a84c,#b8934a);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
.err{background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;font-size:13px;margin-bottom:1rem;}
</style></head><body>
<div class="card">
  <div class="logo">TripMore<span>e</span></div>
  <div class="sub">🔐 Admin Panel</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}<div class="err">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="fg"><label>Username</label><input type="text" name="username" required autofocus></div>
    <div class="fg"><label>Password</label><input type="password" name="password" required></div>
    <button type="submit" class="sbtn">Login to Admin →</button>
  </form>
  <div style="margin-top:1.5rem;font-size:12px;color:#888;"><a href="/" style="color:#c9a84c;">← Back to TripMoree</a></div>
</div>
</body></html>
