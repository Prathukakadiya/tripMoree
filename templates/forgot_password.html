{% extends "base.html" %}
{% block title %}Forgot Password — TripMoree{% endblock %}
{% block extra_css %}<style>
.auth-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.auth-card{background:#fff;border:1px solid #e8e4de;border-radius:24px;padding:2.5rem;width:100%;max-width:420px;text-align:center;}
.auth-logo{font-family:Georgia,serif;font-size:1.8rem;color:#0d0f0e;margin-bottom:.4rem;}
.auth-logo span{color:#c9a84c;}
.auth-sub{font-size:13px;color:#888;margin-bottom:2rem;}
.fg{margin-bottom:1.2rem;text-align:left;}
.fg label{display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.fg input{width:100%;padding:13px 16px;border:1.5px solid #e8e4de;border-radius:12px;font-size:14px;font-family:inherit;outline:none;}
.fg input:focus{border-color:#c9a84c;}
.sbtn{width:100%;padding:14px;background:linear-gradient(135deg,#c9a84c,#b8934a);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.sbtn:hover{opacity:.9;}
</style>{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">TripMore<span>e</span></div>
    <div class="auth-sub">Enter your email and we'll send an OTP to reset your password</div>
    <form method="POST">
      <div class="fg"><label>Email Address</label><input type="email" name="email" placeholder="your@email.com" required autofocus></div>
      <button type="submit" class="sbtn">Send OTP →</button>
    </form>
    <div style="margin-top:1.5rem;font-size:13px;color:#888;">
      Remembered it? <a href="{{ url_for('login') }}" style="color:#c9a84c;font-weight:600;">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
