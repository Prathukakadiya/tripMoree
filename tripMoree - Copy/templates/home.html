<!DOCTYPE html>
<html>
<head>
    <title>TripMoreee | Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            color: gold;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-size: 15px;
        }

        .nav-links a:hover {
            color: gold;
        }

        .book-btn {
            background: gold;
            color: black;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* ---------- HERO SECTION ---------- */
    .hero {
    height: 75vh;
    background-image: url("https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 140px;
}

.hero-text {
    width: 75%;
    background: rgba(0,0,0,0.45);
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    color:#FFDAB9;
    animation: fadeSlide 1.5s ease-out;
}

.hero-text h1 {
    font-size: 44px;
    margin-bottom: 15px;
}

.hero-text p {
    font-size: 20px;
    line-height: 1.5;
}
@keyframes fadeSlide {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


    </style>
</head>
<body>

<!-- ---------- NAVBAR ---------- -->
<div class="navbar">
    <div class="logo">TripMoreee</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="#">About</a>
        <a href="#">Destinations</a>
        <a href="#">Gallery</a>
        <a href="#" class="book-btn">Book Now</a>
    </div>
</div>

<!-- ---------- HERO IMAGE ---------- -->
<div class="hero">
    <div class="hero-text">
        <h1>Discover Beautiful Places</h1>
        <p>
            Explore mountains, beaches, cities and nature with TripMoreee.
            Plan your perfect vacation with comfort and happiness.
        </p>
    </div>
</div>
<div class="about"

</body>
</html>
